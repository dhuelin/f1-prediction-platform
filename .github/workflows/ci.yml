name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Run all unit tests
        run: ./gradlew test --no-daemon -q

  docker-smoke-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start all services
        run: docker compose up -d --build
        timeout-minutes: 15

      # nc -z passes immediately because Docker's userland proxy binds the host port
      # as soon as the container starts, before the JVM initialises. Wait for an actual
      # HTTP response instead — any status code means Spring Boot is serving.
      - name: Wait for all services to be HTTP-ready
        run: |
          wait_for_http() {
            local name=$1
            local url=$2
            echo "Waiting for $name ($url)..."
            for i in $(seq 1 60); do
              local status
              status=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 "$url" 2>/dev/null || echo "000")
              if [ "$status" != "000" ]; then
                echo "  $name is ready (HTTP $status)"
                return 0
              fi
              echo "  Attempt $i/60 - waiting 5s..."
              sleep 5
            done
            echo "  $name did not become ready after 5 minutes"
            docker compose logs "$name" --tail=30
            return 1
          }

          wait_for_http auth-service       "http://localhost:8081/auth/api/v1/login"  || exit 1
          wait_for_http prediction-service "http://localhost:8082/predictions/"        || exit 1
          wait_for_http league-service     "http://localhost:8083/leagues/"            || exit 1
          wait_for_http scoring-service    "http://localhost:8084/scores/"             || exit 1
          wait_for_http f1-data-service    "http://localhost:8085/f1/races"            || exit 1
          wait_for_http api-gateway        "http://localhost:8080/auth/api/v1/login"   || exit 1

      - name: Smoke test - all routes reachable via api-gateway
        run: |
          check_route() {
            local label=$1
            local url=$2
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 "$url")
            echo "Gateway $label: HTTP $status"
            # 502/503/504 = gateway cannot reach the backend service
            if echo "$status" | grep -qE "^50[234]$"; then
              echo "  FAIL: gateway returned $status — backend unreachable or route misconfigured"
              docker compose logs api-gateway --tail=20
              return 1
            fi
            return 0
          }

          check_route "/auth"        "http://localhost:8080/auth/api/v1/login"  || exit 1
          check_route "/predictions" "http://localhost:8080/predictions/"        || exit 1
          check_route "/leagues"     "http://localhost:8080/leagues/"            || exit 1
          check_route "/scores"      "http://localhost:8080/scores/"             || exit 1
          check_route "/f1"          "http://localhost:8080/f1/races"            || exit 1

      - name: Print all service logs on failure
        if: failure()
        run: docker compose logs --tail=50

      - name: Tear down
        if: always()
        run: docker compose down -v
