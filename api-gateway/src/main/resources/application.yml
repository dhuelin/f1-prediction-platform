server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: f1-data-service
          uri: http://localhost:8085
          predicates:
            - Path=/f1/**
        - id: prediction-service
          uri: http://localhost:8082
          predicates:
            - Path=/predictions/**
        - id: league-service
          uri: http://localhost:8083
          predicates:
            - Path=/leagues/**
        - id: scoring-service
          uri: http://localhost:8084
          predicates:
            - Path=/scores/**

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-256-bit-key}
