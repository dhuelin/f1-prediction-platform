server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/auth/**
        - id: f1-data-service
          uri: http://f1-data-service:8085
          predicates:
            - Path=/f1/**
        - id: prediction-service
          uri: http://prediction-service:8082
          predicates:
            - Path=/predictions/**
        - id: league-service
          uri: http://league-service:8083
          predicates:
            - Path=/leagues/**
        - id: scoring-service
          uri: http://scoring-service:8084
          predicates:
            - Path=/scores/**
        - id: web-app
          uri: http://web:3000
          predicates:
            - Path=/app/**
          filters:
            - StripPrefix=1

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-256-bit-key}
