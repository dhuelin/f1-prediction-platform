server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: f1-data-service
          uri: http://localhost:8085
          predicates:
            - Path=/f1/**

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-256-bit-key}
