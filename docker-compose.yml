services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: f1predict
      POSTGRES_PASSWORD: f1predict
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1predict"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: f1predict
      RABBITMQ_DEFAULT_PASS: f1predict
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: f1predict
      SPRING_DATASOURCE_PASSWORD: f1predict
      SPRING_RABBITMQ_HOST: rabbitmq
      JWT_SECRET: change-me-in-production-use-256-bit-key-minimum
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  prediction-service:
    build:
      context: .
      dockerfile: services/prediction-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/prediction_db
      SPRING_DATASOURCE_USERNAME: f1predict
      SPRING_DATASOURCE_PASSWORD: f1predict
      SPRING_RABBITMQ_HOST: rabbitmq
      JWT_SECRET: change-me-in-production-use-256-bit-key-minimum
      SERVICES_SCORING_URL: http://scoring-service:8084
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  league-service:
    build:
      context: .
      dockerfile: services/league-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/league_db
      SPRING_DATASOURCE_USERNAME: f1predict
      SPRING_DATASOURCE_PASSWORD: f1predict
      SPRING_RABBITMQ_HOST: rabbitmq
      JWT_SECRET: change-me-in-production-use-256-bit-key-minimum
      SERVICES_SCORING_URL: http://scoring-service:8084
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  scoring-service:
    build:
      context: .
      dockerfile: services/scoring-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/scoring_db
      SPRING_DATASOURCE_USERNAME: f1predict
      SPRING_DATASOURCE_PASSWORD: f1predict
      SPRING_RABBITMQ_HOST: rabbitmq
      JWT_SECRET: change-me-in-production-use-256-bit-key-minimum
      SERVICES_PREDICTION_URL: http://prediction-service:8082
      SERVICES_LEAGUE_URL: http://league-service:8083
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  f1-data-service:
    build:
      context: .
      dockerfile: services/f1-data-service/Dockerfile
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/f1data_db
      SPRING_DATASOURCE_USERNAME: f1predict
      SPRING_DATASOURCE_PASSWORD: f1predict
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: change-me-in-production-use-256-bit-key-minimum
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: change-me-in-production-use-256-bit-key-minimum
    depends_on:
      - auth-service
      - prediction-service
      - league-service
      - scoring-service
      - f1-data-service

  web:
    build: ./web
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://api-gateway:8080
    depends_on:
      - api-gateway

volumes:
  postgres_data:
