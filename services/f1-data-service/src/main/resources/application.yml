server:
  port: 8085

spring:
  application:
    name: f1-data-service
  datasource:
    url: jdbc:postgresql://localhost:5432/f1data_db
    username: f1predict
    password: f1predict
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: f1predict
    password: f1predict

f1:
  jolpica:
    base-url: https://api.jolpi.ca
  openf1:
    base-url: https://api.openf1.org
