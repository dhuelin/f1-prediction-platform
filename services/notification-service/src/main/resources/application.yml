server:
  port: 8086

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: f1predict
    password: f1predict
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: f1predict
    password: f1predict
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

apns:
  team-id: ${APNS_TEAM_ID:}
  key-id: ${APNS_KEY_ID:}
  bundle-id: ${APNS_BUNDLE_ID:com.f1predict.app}
  auth-key: ${APNS_AUTH_KEY:}
  production: ${APNS_PRODUCTION:false}

fcm:
  credentials-json: ${FIREBASE_CREDENTIALS_JSON:}
