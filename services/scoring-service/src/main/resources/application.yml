server:
  port: 8084

spring:
  application:
    name: scoring-service
  datasource:
    url: jdbc:postgresql://localhost:5432/scoring_db
    username: f1predict
    password: f1predict  # dev default — override via env var in production
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: f1predict
    password: f1predict  # dev default — override via env var in production
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

services:
  prediction-url: http://localhost:8082
  league-url: http://localhost:8083
  f1data-url: http://localhost:8085
